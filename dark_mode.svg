<svg xmlns="http://www.w3.org/2000/svg" width="854" height="400" viewBox="0 0 854 400">
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideRight { from { transform: translateX(-10px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .name { font: 600 34px 'Consolas', monospace; fill: #ec8e50; animation: fadeIn 0.8s ease-in; }
    .title { font: 400 16px 'Consolas', monospace; fill: #8b949e; animation: fadeIn 1s ease-in; }
    .section { font: 600 14px 'Consolas', monospace; fill: #ec8e50; }
    .label { font: 400 14px 'Consolas', monospace; fill: #c9d1d9; }
    .value { font: 400 14px 'Consolas', monospace; fill: #8b949e; }
    .dash { font: 400 14px 'Consolas', monospace; fill: #484f58; }
    .link { font: 400 14px 'Consolas', monospace; fill: #ec8e50; }
    .divider { stroke: #30363d; stroke-width: 1; }
    .cursor { animation: blink 1s step-end infinite; fill: #ec8e50; }
    .row { animation: slideRight 0.6s ease-out backwards; }
    .d1 { animation-delay: 0.05s; } .d2 { animation-delay: 0.1s; } .d3 { animation-delay: 0.15s; }
    .d4 { animation-delay: 0.2s; } .d5 { animation-delay: 0.25s; } .d6 { animation-delay: 0.3s; }
    .d7 { animation-delay: 0.35s; } .d8 { animation-delay: 0.4s; } .d9 { animation-delay: 0.45s; }
    .d10 { animation-delay: 0.5s; } .d11 { animation-delay: 0.55s; }
  </style>
  <rect width="854" height="400" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <!-- Header -->
  <g transform="translate(25, 38)">
    <text class="name">Jonathan M.<tspan class="cursor">|</tspan></text>
  </g>
  <g transform="translate(25, 60)">
    <text class="title">Technical Support Analyst . Freelancer</text>
  </g>
  <line class="divider" x1="25" y1="75" x2="829" y2="75"/>

  <!-- Skill Set Section -->
  <g transform="translate(25, 100)">
    <text><tspan class="dash">_</tspan><tspan class="section"> Skill Set </tspan><tspan class="dash">________________________________________________________________________________________</tspan></text>
  </g>
  <g transform="translate(25, 120)" class="row d1">
    <text><tspan class="label">- Languages.Frontend:</tspan><tspan class="dash"> --------------------------------------------------- </tspan><tspan class="value">HTML, CSS, JSON, JavaScript</tspan></text>
  </g>
  <g transform="translate(25, 140)" class="row d2">
    <text><tspan class="label">- Languages.Programming:</tspan><tspan class="dash"> --------------------------------------------------------- </tspan><tspan class="value">Python, SQL, PHP</tspan></text>
  </g>
  <g transform="translate(25, 160)" class="row d3">
    <text><tspan class="label">- Languages.Spoken:</tspan><tspan class="dash"> ------------------------------------------------------------- </tspan><tspan class="value">English, Filipino</tspan></text>
  </g>
  <g transform="translate(25, 180)" class="row d4">
    <text><tspan class="label">- Others:</tspan><tspan class="dash"> --------------------------------------------- </tspan><tspan class="value">Jotform, Salesforce, Make, GitHub, VS Code</tspan></text>
  </g>

  <!-- Contact Section -->
  <g transform="translate(25, 220)">
    <text><tspan class="dash">_</tspan><tspan class="section"> Contact </tspan><tspan class="dash">__________________________________________________________________________________________</tspan></text>
  </g>
  <g transform="translate(25, 240)" class="row d5">
    <text><tspan class="label">- Email.Personal:</tspan><tspan class="dash"> ------------------------------------------------------------ </tspan><tspan class="link">jcmanlutac@gmail.com</tspan></text>
  </g>
  <g transform="translate(25, 260)" class="row d6">
    <text><tspan class="label">- Email.Personal:</tspan><tspan class="dash"> --------------------------------------------------------- </tspan><tspan class="link">jonathan@jcmanlutac.com</tspan></text>
  </g>
  <g transform="translate(25, 280)" class="row d7">
    <text><tspan class="label">- Email.Work:</tspan><tspan class="dash"> ------------------------------------------------------------------- </tspan><tspan class="link">jonathan@alaeh.ph</tspan></text>
  </g>
  <g transform="translate(25, 300)" class="row d8">
    <text><tspan class="label">- URL.Personal:</tspan><tspan class="dash"> -------------------------------------------------------------------- </tspan><tspan class="link">jcmanlutac.com</tspan></text>
  </g>
  <g transform="translate(25, 320)" class="row d9">
    <text><tspan class="label">- URL.Work:</tspan><tspan class="dash"> ------------------------------------------------------------------------------ </tspan><tspan class="link">alaeh.ph</tspan></text>
  </g>
  <g transform="translate(25, 340)" class="row d10">
    <text><tspan class="label">- LinkedIn:</tspan><tspan class="dash"> ------------------------------------------------------------------------- </tspan><tspan class="link">in/jcmanlutac</tspan></text>
  </g>
  <g transform="translate(25, 360)" class="row d11">
    <text><tspan class="label">- Upwork:</tspan><tspan class="dash"> ----------------------------------------------------------------------------- </tspan><tspan class="link">Jonathan M.</tspan></text>
